<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StreakFlow — Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        
        <!-- Sidebar (compact) -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div>
                    <h1>StreakFlow</h1>
                    <p class="logo-sub">Habit Tracker</p>
                </div>
            </div>

            <button class="btn-add-habit" id="addHabitBtn">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                    <path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                New Habit
            </button>

            <div class="stats-overview">
                <div class="stat-card">
                    <span class="stat-label">Total</span>
                    <span class="stat-value" id="totalHabits">0</span>
                </div>
                <div class="stat-card streak-highlight">
                    <span class="stat-label">🔥 Best Streak</span>
                    <span class="stat-value" id="bestStreak">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Today</span>
                    <span class="stat-value" id="completionRate">0%</span>
                </div>
            </div>

            <div class="tip-box">
                <span class="tip-icon">💡</span>
                <p>Check off habits daily. Missed days break your streak.</p>
            </div>

            <div class="today-banner">
                <span>📅</span>
                <span id="currentDate"></span>
            </div>
        </aside>

        <main class="main-content">
            <!-- Week Navigation (compact) -->
            <div class="week-navigation">
                <button class="nav-btn" id="prevWeekBtn">←</button>
                <div class="week-display">
                    <span id="weekRange"></span>
                    <button class="this-week-btn" id="thisWeekBtn">Today</button>
                </div>
                <button class="nav-btn" id="nextWeekBtn">→</button>
            </div>

            <!-- Habit Grid Container -->
            <div class="grid-container" id="gridContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📋</div>
                    <h3>Your first habit starts here</h3>
                    <p>Add a habit you want to track daily.</p>
                    <button class="btn-primary" id="emptyStateAddBtn">+ Add Your First Habit</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="habitModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">New Habit</h2>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="habitNameInput" placeholder="e.g., Read 30 min, Exercise, Meditate" autocomplete="off">
                <div class="modal-actions">
                    <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
                    <button class="btn-primary" id="saveHabitBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
